server:
  port: ${RP_INSIGHT_PORT:8081}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-response: true

spring:
  application:
    name: rp-insight-service
  servlet:
    multipart:
      max-file-size: ${RP_INSIGHT_MAX_FILE_SIZE:100MB}
      max-request-size: ${RP_INSIGHT_MAX_REQUEST_SIZE:110MB}
  datasource:
    url: ${RP_INSIGHT_DB_URL:jdbc:postgresql://localhost:5432/rp_insight}
    username: ${RP_INSIGHT_DB_USER:rp_insight}
    password: ${RP_INSIGHT_DB_PASSWORD:rp_insight}
  flyway:
    enabled: true

rp-insight:
  storage:
    backend: ${RP_INSIGHT_STORAGE_BACKEND:LOCAL}
    local-root: ${RP_INSIGHT_LOCAL_STORAGE_ROOT:./data/rp-insight}
    firebase-bucket: ${RP_INSIGHT_FIREBASE_BUCKET:}
    firebase-credentials-path: ${RP_INSIGHT_FIREBASE_CREDENTIALS_PATH:}
  ingestion:
    async: ${RP_INSIGHT_ASYNC_INGESTION:true}
    chunk-target-chars: ${RP_INSIGHT_CHUNK_TARGET_CHARS:900}
    chunk-overlap-chars: ${RP_INSIGHT_CHUNK_OVERLAP_CHARS:120}
    max-extracted-elements: ${RP_INSIGHT_MAX_EXTRACTED_ELEMENTS:50000}
  retrieval:
    top-k: ${RP_INSIGHT_TOP_K:5}
    min-similarity: ${RP_INSIGHT_MIN_SIMILARITY:0.55}
  ai:
    provider: ${RP_INSIGHT_AI_PROVIDER:gemini}
    gemini-api-key: ${GEMINI_AI_KEY:}
    gemini-model: ${RP_INSIGHT_GEMINI_MODEL:gemini-2.5-flash-lite}
    open-ai-api-key: ${OPENAI_API_KEY:}
    open-ai-model: ${RP_INSIGHT_OPENAI_MODEL:gpt-4o}
    embedding-model: ${RP_INSIGHT_EMBEDDING_MODEL:gemini-embedding-001}
    embedding-dimensions: ${RP_INSIGHT_EMBEDDING_DIMENSIONS:768}
    temperature: ${RP_INSIGHT_TEMPERATURE:0.1}
  parsing:
    aspose-license-path: ${ASPOSE_CAD_LICENSE_PATH:}
  ocr:
    enabled: ${RP_INSIGHT_OCR_ENABLED:false}
    data-path: ${TESSDATA_PREFIX:}
    language: ${RP_INSIGHT_OCR_LANGUAGE:eng+hin+mar}
    dpi: ${RP_INSIGHT_OCR_DPI:220}
  cors:
    allowed-origins: ${RP_INSIGHT_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
